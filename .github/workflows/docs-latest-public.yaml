name: Docs Build and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      SEARCH_API_BASE: https://csl860x2oj.execute-api.us-east-2.amazonaws.com/prod
      DOC_CATALOG_SOURCE_ID: docs-tenstorrent
      DOC_SITE_BASE_URL: https://firdovsimammedovk.github.io/tt-metal
      DOCS_ID_NAMESPACE: tt-metal
      DOCS_SEARCH_INGEST_API_KEY: ${{ secrets.DOCS_SEARCH_INGEST_API_KEY_TT_METAL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}
          submodules: recursive
          fetch-depth: 0

      - name: Ensure submodules are initialized
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive --jobs 8
          git submodule status --recursive
          if git submodule status --recursive | grep -q "^-"; then
            echo "Some submodules are uninitialized."
            echo "If submodules are private, set SUBMODULES_TOKEN with read access."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore docs virtualenv cache
        id: cache-docs-venv
        uses: actions/cache@v4
        with:
          path: .ci-docs-venv
          key: ${{ runner.os }}-docs-venv-py311-${{ hashFiles('docs/requirements-docs.txt', 'setup.py', 'pyproject.toml') }}

      - name: Restore C++ build cache
        id: cache-build
        uses: actions/cache@v4
        with:
          path: |
            build
            build_Release
          key: ${{ runner.os }}-docs-build-${{ hashFiles('build_metal.sh', 'CMakeLists.txt', 'cmake/**/*.cmake', 'tt_metal/CMakeLists.txt', 'ttnn/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-docs-build-

      - name: Activate docs virtualenv
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d ".ci-docs-venv" ]]; then
            python3 -m venv .ci-docs-venv
          fi
          echo "VIRTUAL_ENV=${{ github.workspace }}/.ci-docs-venv" >> "$GITHUB_ENV"
          echo "${{ github.workspace }}/.ci-docs-venv/bin" >> "$GITHUB_PATH"

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz ninja-build rsync clang lld libnuma-dev libhwloc-dev libopenmpi-dev openmpi-bin pandoc
          # Project toolchain expects clang-20/clang++-20 names.
          if ! command -v clang-20 >/dev/null 2>&1; then
            sudo ln -sf "$(command -v clang)" /usr/local/bin/clang-20
          fi
          if ! command -v clang++-20 >/dev/null 2>&1; then
            sudo ln -sf "$(command -v clang++)" /usr/local/bin/clang++-20
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Verify TTNN backend import
        id: verify-ttnn-backend
        shell: bash
        run: |
          set +e
          source .ci-docs-venv/bin/activate
          python - <<'PY'
          import importlib
          import sys
          try:
              importlib.import_module("ttnn._ttnn")
              sys.exit(0)
          except Exception:
              sys.exit(1)
          PY
          status=$?
          if [ "$status" -eq 0 ]; then
            echo "ttnn_backend_ready=true" >> "$GITHUB_OUTPUT"
            echo "TTNN backend import check: OK"
          else
            echo "ttnn_backend_ready=false" >> "$GITHUB_OUTPUT"
            echo "TTNN backend import check: MISSING"
          fi

      - name: Build native prerequisites (best effort)
        if: steps.cache-build.outputs.cache-hit != 'true'
        shell: bash
        run: |
          set -euo pipefail
          source .ci-docs-venv/bin/activate
          python -m pip install --upgrade pip
          build_status=0
          if [[ -x ./build_metal.sh ]]; then
            set +e
            ./build_metal.sh --disable-profiler
            build_status=$?
            set -e
          elif [[ -f ./build_metal.sh ]]; then
            chmod +x ./build_metal.sh
            set +e
            ./build_metal.sh --disable-profiler
            build_status=$?
            set -e
          else
            set +e
            cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=build -DENABLE_TRACY=OFF
            cmake --build build
            cmake --install build
            build_status=$?
            set -e
          fi
          if [[ "$build_status" -ne 0 ]]; then
            echo "::warning::Native build failed (likely SFPI toolchain issue). Continuing with Python packaging fallback."
          fi

      - name: Install docs/python prerequisites
        if: steps.cache-docs-venv.outputs.cache-hit != 'true' || steps.verify-ttnn-backend.outputs.ttnn_backend_ready != 'true'
        shell: bash
        run: |
          set -euo pipefail
          source .ci-docs-venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r docs/requirements-docs.txt
          if [[ ! -x "/opt/tenstorrent/sfpi/compiler/bin/riscv-tt-elf-g++" ]]; then
            echo "System SFPI compiler not found. Installing via install_dependencies.sh --sfpi"
            chmod +x ./install_dependencies.sh
            sudo ./install_dependencies.sh --sfpi
          else
            echo "System SFPI compiler already present."
          fi
          if [[ -f "build/lib/_ttnn.so" && -d "build/lib" && -d "runtime" ]]; then
            echo "Attempting precompiled tt-metal install (build/lib + runtime present)"
            set +e
            TT_FROM_PRECOMPILED_DIR="${GITHUB_WORKSPACE}" pip install --force-reinstall .
            precompiled_status=$?
            set -e
            if [[ "$precompiled_status" -ne 0 ]]; then
              echo "::warning::Precompiled install failed, falling back to CMake wheel build."
              CIBUILDWHEEL=1 CIBW_BUILD_TYPE=Release pip install --force-reinstall .
            fi
          else
            echo "Precompiled artifacts incomplete (need build/lib and runtime); using CMake wheel build path"
            CIBUILDWHEEL=1 CIBW_BUILD_TYPE=Release pip install --force-reinstall .
          fi
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest

      - name: Verify TTNN backend import before docs build
        shell: bash
        run: |
          set -euo pipefail
          source .ci-docs-venv/bin/activate
          python - <<'PY'
          import importlib
          importlib.import_module("ttnn._ttnn")
          print("ttnn._ttnn import OK")
          PY

      - name: Build docs
        working-directory: docs
        env:
          TT_METAL_HOME: ${{ github.workspace }}
        run: make html

      - name: Skip indexing when API key is missing
        if: ${{ env.DOCS_SEARCH_INGEST_API_KEY == '' }}
        run: |
          echo "::warning::Skipping remote search indexing because DOCS_SEARCH_INGEST_API_KEY_TT_METAL is not set."

      - name: Trigger remote search indexing
        if: ${{ env.DOCS_SEARCH_INGEST_API_KEY != '' }}
        run: |
          python docs/scripts/index_remote_search.py

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy-docs:
    runs-on: ubuntu-24.04
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
