name: Docs Build and Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SUBMODULES_TOKEN || github.token }}
          submodules: recursive
          fetch-depth: 0

      - name: Ensure submodules are initialized
        shell: bash
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --recursive --jobs 8
          git submodule status --recursive
          if git submodule status --recursive | grep -q "^-"; then
            echo "Some submodules are uninitialized."
            echo "If submodules are private, set SUBMODULES_TOKEN with read access."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz ninja-build rsync clang lld libnuma-dev libhwloc-dev
          # Project toolchain expects clang-20/clang++-20 names.
          if ! command -v clang-20 >/dev/null 2>&1; then
            sudo ln -sf "$(command -v clang)" /usr/local/bin/clang-20
          fi
          if ! command -v clang++-20 >/dev/null 2>&1; then
            sudo ln -sf "$(command -v clang++)" /usr/local/bin/clang++-20
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build and install prerequisites
        shell: bash
        run: |
          set -euo pipefail
          if [[ -x ./build_metal.sh ]]; then
            ./build_metal.sh
          elif [[ -f ./build_metal.sh ]]; then
            chmod +x ./build_metal.sh
            ./build_metal.sh
          else
            cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=build
            cmake --build build
            cmake --install build
          fi
          pip install -r docs/requirements-docs.txt
          CIBUILDWHEEL=1 CIBW_BUILD_TYPE=Release pip install -e .
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest

      - name: Build docs
        working-directory: docs
        env:
          TT_METAL_HOME: ${{ github.workspace }}
        run: make html

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build/html

  deploy-docs:
    runs-on: ubuntu-24.04
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
