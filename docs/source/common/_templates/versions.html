{% if versions %}
<div class="rst-versions" data-toggle="rst-versions" role="note" aria-label="versions">
    <span class="rst-current-version" data-toggle="rst-current-version">
        Version: {{ current_version }}
        <span class="fa fa-caret-down"></span>
    </span>
    <div class="rst-other-versions">
        <dl>
            <dt>{{ _('Versions') }}</dt>
            {% for version in versions %}
            <dd>
              {% if version == 'latest' %}
              <a href="{{ docs_site_base }}/{{ docs_project_subpath }}/">{{ version }}</a>
              {% else %}
              <a href="{{ docs_site_base }}/{{ version }}/{{ docs_project_subpath }}/">{{ version }}</a>
              {% endif %}
            </dd>
            {% endfor %}
        </dl>
        <br>
    </div>
</div>
<script>
(function () {
  var el = document.getElementsByClassName("wy-side-nav-search").item(0);
  if (!el) return;
  var nameEl = el.children.item(1);
  if (!nameEl) return;
  var span = document.createElement("span");
  span.className = "project-versions";
  span.textContent = "{{ current_version|e }}";
  nameEl.appendChild(span);
})();
</script>
{% endif %}
