<div class="rst-versions" data-toggle="rst-versions" role="note" aria-label="versions">
    <span class="rst-current-version" data-toggle="rst-current-version">
        Version: <span id="current-version">latest</span>
        <span class="fa fa-caret-down"></span>
    </span>
    <div class="rst-other-versions">
        <dl id="version-list">
            <dt>{{ _('Versions') }}</dt>
        </dl>
        <br>
        </dl>
    </div>
</div>

<script>
const VERSIONS_URL = 'https://raw.githubusercontent.com/tenstorrent/tt-metal/refs/heads/main/docs/published_versions.json';

async function loadVersions() {
    try {
        const response = await fetch(VERSIONS_URL);
        const data = await response.json();
        const versionList = document.getElementById('version-list');
        const parts = window.location.pathname.split('/').filter(Boolean);
        let projectCode = "";
        if (parts[0] === "tt-metal" && (parts[1] === "ttnn" || parts[1] === "tt-metalium")) {
            // New URL style: /tt-metal/<project>/
            projectCode = parts[1];
        } else if (parts[0] === "tt-metal" && parts.length > 2) {
            // Legacy URL style: /tt-metal/<version>/<project>/
            projectCode = parts[2];
        }
        const projectBaseUrls = {
            "ttnn": "https://firdovsimammedovk.github.io/tt-metal/ttnn/",
            "tt-metalium": "https://firdovsimammedovk.github.io/tt-metal/tt-metalium/",
        };
        const fallbackUrl = "https://firdovsimammedovk.github.io/tenstorrent/";
        const targetUrl = projectBaseUrls[projectCode] || fallbackUrl;

        data.versions.forEach(version => {
            const dd = document.createElement('dd');
            const link = document.createElement('a');
            link.href = targetUrl;
            link.textContent = version;
            dd.appendChild(link);
            versionList.appendChild(dd);
        });
    } catch (error) {
        console.error('Error loading versions:', error);
    }
}

loadVersions();

function getCurrentVersion() {
    const parts = window.location.pathname.split('/').filter(Boolean);
    // New URL style has no version segment.
    if (parts[0] === "tt-metal" && (parts[1] === "ttnn" || parts[1] === "tt-metalium")) {
        return "latest";
    }
    // Legacy URL style.
    if (parts[0] === "tt-metal" && parts.length > 1) {
        return parts[1];
    }
    return "latest";
}
document.getElementById('current-version').textContent = getCurrentVersion();

const versionEl = document.createElement("span");
versionEl.innerText = getCurrentVersion();
versionEl.className = "project-versions";
const wySideSearchEl = document.getElementsByClassName("wy-side-nav-search").item(0);
if (wySideSearchEl) {
    const projectNameEl = wySideSearchEl.children.item(1);
    if (projectNameEl) projectNameEl.appendChild(versionEl);
}

</script>
